name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build
        env:
          BUILD_FOR_ANDROID: 'true'
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Sync Web Code to Capacitor Android
        run: npx cap sync android

      - name: Build APK (Debug & Release)
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Build AAB (Release Bundle)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Unsigned Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned-aab
          path: android/app/build/outputs/bundle/release/app-release-unsigned.aab
